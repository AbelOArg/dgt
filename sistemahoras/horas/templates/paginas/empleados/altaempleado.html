{% extends "menu.html" %}

{% block titulo %}Alta de empleado{% endblock %}

{% block contenido %}

{% if messages %}
  {% for mensaje in messages %}
    <div class="alert alert-success {{ mensaje.tags }}">
      {{ mensaje }}
    </div>
  {% endfor %}
{% endif %}



<div class="card">
    <div class="card-header"></div>
    <div class="card-body">
        
        <h4 class="card-title">Nuevo empleado</h4>
        
        <form method="post">
            {% csrf_token %}
            {{ formulario.as_p }}

            <button type="submit" class="btn btn-primary">
                Guardar empleado
            </button>

    </div>
    
</div>


{% endblock %}
