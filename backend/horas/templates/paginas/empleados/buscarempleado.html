{% extends 'menu.html' %}

{% block titulo %}Buscar empleado{% endblock %}

{% block contenido %}
{% if messages %}
    {% for message in messages %}
        <p class="mensaje {{ message.tags }}">{{ message }}</p>
    {% endfor %}
{% endif %}

<div class="card">
    <div class="card-body">
        <h4 class="card-title">Buscar empleado para editar</h4>

        <form method="get">
            <label>Afiliado</label>
            <input type="number" name="afiliado" required value="{{ request.GET.afiliado }}">

            <div>
                <input type="checkbox" name="incluir_inactivos" id="incluir_inactivos"
                       {% if request.GET.incluir_inactivos %}checked{% endif %}>
                <label for="incluir_inactivos">Incluir empleados inactivos</label>
            </div>

            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>
    </div>
</div>
{% endblock %}
